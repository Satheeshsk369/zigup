name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install zigup
        run: curl -sSfL https://raw.githubusercontent.com/Satheeshsk369/zigup/${{ github.ref_name }}/install.sh | sh

      - name: Install Zig via zigup
        run: |
          $HOME/.local/bin/zigup install master
          echo "$HOME/.local/bin" >> $GITHUB_PATH
        shell: bash

      - name: Cross-Compile Binaries
        run: |
          mkdir -p dist

          for arch in x86 x86_64 aarch64; do
            echo "Building Linux $arch"
            zig build -Doptimize=ReleaseFast -Dtarget=$arch-linux
            cp zig-out/bin/zigup dist/zigup-$arch-linux
          done

          for arch in x86_64 aarch64; do
            echo "Building macOS $arch"
            zig build -Doptimize=ReleaseFast -Dtarget=$arch-macos
            cp zig-out/bin/zigup dist/zigup-$arch-macos
          done

          for arch in x86 x86_64 aarch64; do
            echo "Building Windows $arch"
            zig build -Doptimize=ReleaseFast -Dtarget=$arch-windows
            cp zig-out/bin/zigup.exe dist/zigup-$arch-windows.exe
          done
        shell: bash

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: dist/*
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
